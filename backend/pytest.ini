[pytest]
# Add the repo root to sys.path so conftest.py + tests can do
# `from backend import ...`. Without this CI fails on
# `ModuleNotFoundError: No module named 'backend'` because pytest's
# rootdir resolves to the directory containing this ini file
# (backend/) — the parent (repo root) is what holds the `backend/`
# package, so we have to add it explicitly. Path is relative to this
# ini file's directory.
pythonpath = ..

# Collect only the backend test directory so a `pytest` invocation from
# the repo root (or anywhere under it) doesn't accidentally pick up stray
# test_*.py files in tools/ scripts/ etc.
testpaths = backend/tests

# pytest-asyncio in auto mode turns every `async def test_*` function
# into an asyncio test without per-function decorators. Sibling test
# modules (test_admin_ban, test_agent_handshake, test_rate_limit,
# test_race_conditions, test_malicious_input) all rely on this — they
# write plain `async def test_xyz(client)` and expect it to just run.
asyncio_mode = auto

# Default fixture loop scope ("function") matches pytest-asyncio 0.23+
# semantics. Pinning it silences the "asyncio_default_fixture_loop_scope
# is unset" deprecation warning when running on newer plugin versions.
asyncio_default_fixture_loop_scope = function

# Show the slowest 10 tests at the end of every run — fast feedback when
# a fixture / mock starts blocking on something it shouldn't (e.g. real
# network call leaking through a missing mock).
addopts = -ra --durations=10

# Per-test timeout via pytest-timeout. Without this a single hanging
# fixture (e.g. an async background loop blocking on an unmocked socket)
# will burn the entire CI runner timeout (~15 min) and produce zero
# output about where it died — exactly what bit us on the first CI run.
# 60s is generous for unit tests that should complete in ~ms; if a real
# test legitimately needs longer, mark it `@pytest.mark.timeout(N)`.
timeout = 60
timeout_method = thread

# Keep warnings visible but don't promote them to errors. The "missing
# await" RuntimeWarning is a real signal but we get false positives
# from MagicMock's auto-created attributes when fixtures stub async
# helpers, and a noisy false-positive in CI is worse than a missed
# warning at this stage. Sibling test authors can tighten per-test
# with @pytest.mark.filterwarnings("error::RuntimeWarning") when they
# specifically want the strict mode.
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
