# Use Docker's embedded DNS so nginx re-resolves backend/frontend
# container IPs continuously instead of caching once at startup.
# Without this, every backend or frontend rebuild produces a new
# container IP that nginx doesn't know about → 502s until the user
# manually restarts nginx (the recurring stale-upstream issue).
#
# Combining `resolver` with proxy_pass-via-variables forces re-resolution
# on each request (subject to `valid=` TTL). Cost: a sub-millisecond
# Docker DNS lookup per cache miss. Benefit: zero-downtime backend
# rebuilds — nginx picks up the new IP within 10s of the new container
# coming up.
#
# `ipv6=off` skips AAAA lookups since Docker's user-defined networks
# are IPv4-only by default; without this the resolver wastes time
# waiting for an IPv6 timeout on every miss.
resolver 127.0.0.11 valid=10s ipv6=off;


# ── PROD: aria.hoversight.agency ─────────────────────────────────────
#
# Host-explicit since 2026-05-06 (was server_name _;). The catch-all
# was fine before staging existed; now we MUST distinguish so staging
# requests don't accidentally land on the prod containers.
server {
    listen 80;
    server_name aria.hoversight.agency;

    # Frontend (all routes). proxy_pass via $variable forces re-resolution
    # every request — the static `upstream { server frontend:3000; }`
    # block was cached at startup and broke on rebuilds.
    location / {
        set $frontend_upstream "frontend:3000";
        proxy_pass http://$frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API
    location /api {
        set $backend_upstream "backend:8000";
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Socket.IO (WebSocket)
    location /socket.io {
        set $backend_upstream "backend:8000";
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        set $backend_upstream "backend:8000";
        proxy_pass http://$backend_upstream;
    }

    # Let's Encrypt verification (Traefik handles cert provisioning,
    # but this path stays here for any future direct-acme fallback).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}


# ── STAGING: staging.aria.hoversight.agency ─────────────────────────
#
# Same routing logic as prod but proxies to the -staging containers
# spun up by docker-compose.staging.yml. Both hosts share this nginx
# instance, so adding the staging stack costs no extra container.
server {
    listen 80;
    server_name staging.aria.hoversight.agency;

    location / {
        set $frontend_upstream "frontend-staging:3000";
        proxy_pass http://$frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api {
        set $backend_upstream "backend-staging:8000";
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location /socket.io {
        set $backend_upstream "backend-staging:8000";
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        set $backend_upstream "backend-staging:8000";
        proxy_pass http://$backend_upstream;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
