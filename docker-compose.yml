services:

  # ── Backend (FastAPI + Anthropic API) ─────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: aria-backend
    ports:
      # Bound to the docker bridge IP only — backend isn't exposed to the
      # public internet. Paperclip's containers reach it through the docker
      # bridge (172.17.0.1), and the agent skill curls use this same IP.
      - "172.17.0.1:8000:8000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
    volumes:
      # Auth dir for the Claude CLI. Source path on the host is
      # /opt/aria/.claude (chowned to uid 1000 during the security #13
      # migration); destination matches HOME=/home/aria for the
      # non-root aria user inside the container. The auto-restore
      # helper in claude_cli.py expects ~/.claude/backups/*.backup.*
      # to be writable, which this mount provides.
      - /opt/aria/.claude:/home/aria/.claude
    depends_on:
      - redis
      - qdrant
    networks:
      - default
      - paperclip
    restart: unless-stopped

  # ── Frontend (Next.js) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
    container_name: aria-frontend
    ports:
      # Loopback-only — nginx (in this same compose) proxies public
      # traffic to it. Direct exposure on :3000 would bypass nginx.
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aria-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  # ── Qdrant (vector DB for semantic caching) ─────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: aria-qdrant
    restart: unless-stopped
    ports:
      # Loopback-only — Qdrant is internal infra; remote access goes
      # through the backend container (qdrant on the docker network).
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # ── Nginx (reverse proxy + SSL) ────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: aria-nginx
    restart: unless-stopped
    ports:
      # Hostinger's managed Traefik holds the public 80/443 sockets on
      # this VPS, so we serve nginx on 8080/8443 and let Traefik route
      # to it. The labels below tell Traefik which Host header to match
      # and which backend port to hit. SSL termination happens at the
      # Traefik layer (letsencrypt resolver) — nginx itself only needs
      # to handle HTTP on its forwarded port.
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    labels:
      - "traefik.enable=true"
      # PROD router — aria.hoversight.agency
      - "traefik.http.routers.aria.entrypoints=websecure"
      - "traefik.http.routers.aria.rule=Host(`aria.hoversight.agency`)"
      - "traefik.http.routers.aria.tls.certresolver=letsencrypt"
      - "traefik.http.services.aria.loadbalancer.server.port=80"
      # STAGING router — staging.aria.hoversight.agency. Hits the same
      # nginx container, which dispatches by Host header to the
      # backend-staging / frontend-staging upstreams from
      # docker-compose.staging.yml. Cert provisioning via Let's
      # Encrypt happens automatically on first request.
      - "traefik.http.routers.aria-staging.entrypoints=websecure"
      - "traefik.http.routers.aria-staging.rule=Host(`staging.aria.hoversight.agency`)"
      - "traefik.http.routers.aria-staging.tls.certresolver=letsencrypt"
      - "traefik.http.routers.aria-staging.service=aria"
    depends_on:
      - backend
      - frontend


networks:
  paperclip:
    external: true
    name: paperclip-tgdk_default

volumes:
  redis_data:
  qdrant_data:
  certbot_data:
  certbot_www:
