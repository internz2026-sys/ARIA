name: Backend tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a newer commit lands on the same ref.
# Without this, two pushes in quick succession both run to completion
# and the older one can deploy AFTER the newer one finishes — shipping
# stale code. Keyed on workflow + ref so push-to-main and a PR build
# don't fight each other.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-test.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r backend/requirements-test.txt

      - name: Run pytest
        # Test env vars are set by conftest.py; we still pin ARIA_ENV here
        # so any pre-collection import (rare, but possible if a test pulls
        # in a module before conftest fixtures load) sees the right value.
        env:
          ARIA_ENV: test
          SUPABASE_JWT_SECRET: test-secret-for-pytest-only-do-not-use-in-prod
          SUPABASE_URL: https://test.supabase.invalid
          SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
          SUPABASE_ANON_KEY: test-anon-key
        run: |
          pytest backend/tests/ -v -s --tb=short -o log_cli=true -o log_cli_level=INFO

  deploy:
    name: Deploy to VPS
    # Only fire after pytest succeeds. `needs:` already implies "if the
    # required job didn't pass, skip me", so a red test run can never
    # ship — that's the entire point of routing the deploy through CI
    # instead of the old GitHub-push webhook.
    needs: pytest
    # Direct pushes / merges to main only. PR builds run pytest but
    # never deploy — even when they pass — because the merge commit
    # fires its own push event and that's the one we want to ship.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger VPS webhook
        # The VPS webhook listener (adnanh/webhook on :9000) accepts the
        # same payload shape GitHub sends: HMAC-SHA256 of the body in
        # X-Hub-Signature-256, with `ref == refs/heads/main` somewhere in
        # the JSON. We mimic that here so deploy.sh's existing
        # validation works unchanged.
        #
        # Required repo secret: VPS_WEBHOOK_SECRET = the same value as
        # /etc/webhook.conf's `secret` field on the VPS.
        env:
          WEBHOOK_SECRET: ${{ secrets.VPS_WEBHOOK_SECRET }}
          COMMIT_SHA: ${{ github.sha }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ -z "${WEBHOOK_SECRET:-}" ]; then
            echo "::error::VPS_WEBHOOK_SECRET repo secret is not set."
            echo "Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          body=$(printf '{"ref":"refs/heads/main","after":"%s","repository":{"full_name":"%s"}}' \
            "$COMMIT_SHA" "$REPO_FULL_NAME")
          # openssl prints `(stdin)= <hex>` — awk picks the hex.
          sig=$(printf '%s' "$body" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $NF}')
          echo "Deploying $COMMIT_SHA"
          # --max-time 240: deploy.sh typically finishes in 4–40s but a
          # cold rebuild after requirements.txt churn can run 2–3min.
          # Curl exits non-zero on any non-2xx, which fails the job.
          curl -fsS --max-time 240 -X POST \
            "http://72.61.126.188:9000/hooks/deploy-aria" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-Hub-Signature-256: sha256=$sig" \
            -d "$body"
          echo "Deploy webhook accepted."
